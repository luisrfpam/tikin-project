name: Offramp Retry Cron

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  retry-failed-offramp:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger batch retry
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_FUNCTION_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required secrets"
            exit 1
          fi

          curl -sS -X POST "$SUPABASE_FUNCTION_URL/offramp-retry-failed" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "x-internal-service-key: $SUPABASE_SERVICE_ROLE_KEY" \
            -d '{"max_orders":20,"lookback_hours":168}'
